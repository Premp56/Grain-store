<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details — Native Grains Store</title>
  <style>
/* ============================================================
   Native Grains Store — Design System
   Aesthetic: Earthy organic, warm terracotta & sage palette
   Fonts: Playfair Display (headings) + DM Sans (body)
   ============================================================ */



/* ── CSS Variables ── */
:root {
  --clay:       #C4714A;
  --clay-dark:  #A05A38;
  --clay-light: #E8C4A8;
  --sage:       #6B7F5E;
  --sage-light: #B5C4A8;
  --cream:      #FAF6EE;
  --cream-dark: #F0E8D8;
  --soil:       #3D2B1F;
  --soil-light: #6B4D3A;
  --gold:       #C8961A;
  --gold-light: #F0D080;
  --white:      #FFFFFF;
  --gray-50:    #F9F7F4;
  --gray-100:   #EDE9E0;
  --gray-200:   #D4CCBC;
  --gray-400:   #9C917E;
  --gray-600:   #6B6055;
  --gray-800:   #3A322A;

  --font-display: Georgia, 'Times New Roman', serif;
  --font-body:    'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono:    'Courier New', monospace;

  --radius-sm:  6px;
  --radius-md:  12px;
  --radius-lg:  20px;
  --radius-xl:  32px;
  --radius-pill: 100px;

  --shadow-sm:  0 2px 8px rgba(61,43,31,0.08);
  --shadow-md:  0 4px 20px rgba(61,43,31,0.12);
  --shadow-lg:  0 8px 40px rgba(61,43,31,0.16);
  --shadow-xl:  0 16px 60px rgba(61,43,31,0.20);

  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: #FAF6EE;
  color: #3D2B1F;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
button { cursor: pointer; border: none; background: none; font-family: "Segoe UI", system-ui, sans-serif; }
input, select, textarea { font-family: "Segoe UI", system-ui, sans-serif; outline: none; }
ul { list-style: none; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #F0E8D8; }
::-webkit-scrollbar-thumb { background: #E8C4A8; border-radius: 99px; }

/* ── Typography ── */
h1, h2, h3, h4, h5 { font-family: "Georgia, serif"; line-height: 1.2; }
h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; }
h2 { font-size: clamp(1.5rem, 3.5vw, 2.5rem); font-weight: 600; }
h3 { font-size: clamp(1.1rem, 2.5vw, 1.6rem); font-weight: 600; }
h4 { font-size: 1.1rem; font-weight: 600; }
p  { color: #6B4D3A; line-height: 1.75; }

.text-sm  { font-size: 0.875rem; }
.text-xs  { font-size: 0.75rem; }
.text-lg  { font-size: 1.125rem; }
.text-xl  { font-size: 1.25rem; }
.font-bold { font-weight: 600; }
.text-clay  { color: #C4714A; }
.text-sage  { color: #6B7F5E; }
.text-gold  { color: #C8961A; }
.text-gray  { color: #6B6055; }
.text-center { text-align: center; }

/* ── Layout ── */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}
.section { padding: 80px 0; }
.section-sm { padding: 48px 0; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.gap-4 { gap: 16px; }
.gap-6 { gap: 24px; }
.gap-8 { gap: 32px; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.mt-8 { margin-top: 32px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.w-full { width: 100%; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 28px;
  border-radius: 100px;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  white-space: nowrap;
}
.btn-primary {
  background: #C4714A;
  color: #FFFFFF;
  box-shadow: 0 4px 16px rgba(196,113,74,0.35);
}
.btn-primary:hover {
  background: #A05A38;
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(196,113,74,0.45);
}
.btn-outline {
  background: transparent;
  color: #C4714A;
  border: 2px solid #C4714A;
}
.btn-outline:hover {
  background: #C4714A;
  color: #FFFFFF;
}
.btn-sage {
  background: #6B7F5E;
  color: #FFFFFF;
}
.btn-sage:hover { background: #566749; transform: translateY(-1px); }
.btn-sm { padding: 8px 18px; font-size: 0.8rem; }
.btn-lg { padding: 16px 40px; font-size: 1rem; }
.btn-icon { width: 40px; height: 40px; padding: 0; border-radius: 50%; }
.btn-danger { background: #e05555; color: white; }
.btn-danger:hover { background: #c43d3d; }

/* ── Cards ── */
.card {
  background: #FFFFFF;
  border-radius: 20px;
  box-shadow: 0 2px 8px rgba(61,43,31,0.08);
  border: 1px solid #EDE9E0;
  overflow: hidden;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
.card:hover { box-shadow: 0 4px 20px rgba(61,43,31,0.12); transform: translateY(-3px); }
.card-body { padding: 20px; }

/* ── Badges ── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-organic { background: #E8F4E8; color: #6B7F5E; }
.badge-native  { background: #FFF0E8; color: #C4714A; }
.badge-low-stock { background: #FFF3CD; color: #856404; }
.badge-out-stock  { background: #F8D7DA; color: #721C24; }
.badge-in-stock   { background: #D4EDDA; color: #155724; }

/* ── Forms ── */
.form-group { margin-bottom: 20px; }
.form-label {
  display: block;
  font-size: 0.875rem;
  font-weight: 600;
  color: #3D2B1F;
  margin-bottom: 8px;
}
.form-control {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #D4CCBC;
  border-radius: 12px;
  font-size: 0.95rem;
  color: #3D2B1F;
  background: #FFFFFF;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
.form-control:focus { border-color: #C4714A; box-shadow: 0 0 0 3px rgba(196,113,74,0.1); }
.form-control::placeholder { color: #9C917E; }
select.form-control { appearance: none; cursor: pointer; }

/* ── Section Headers ── */
.section-header { margin-bottom: 48px; }
.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #C4714A;
  margin-bottom: 12px;
}
.section-label::before, .section-label::after {
  content: '';
  width: 24px;
  height: 2px;
  background: #E8C4A8;
  border-radius: 2px;
}
.section-title { color: #3D2B1F; }
.section-desc { color: #6B4D3A; max-width: 520px; margin: 12px auto 0; }

/* ── Divider ── */
.divider {
  width: 60px;
  height: 4px;
  background: linear-gradient(90deg, #C4714A, #C8961A);
  border-radius: 4px;
  margin: 16px 0;
}
.divider-center { margin: 16px auto; }

/* ── Navbar ── */
#navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: rgba(250,246,238,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid #EDE9E0;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
#navbar.scrolled {
  box-shadow: 0 4px 20px rgba(61,43,31,0.12);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 24px;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: "Georgia, serif";
  font-size: 1.35rem;
  font-weight: 700;
  color: #3D2B1F;
}
.nav-logo .logo-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, #C4714A, #C8961A);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.1rem;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
}
.nav-link {
  padding: 8px 14px;
  font-size: 0.9rem;
  font-weight: 500;
  color: #6B4D3A;
  border-radius: 6px;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
.nav-link:hover, .nav-link.active {
  color: #C4714A;
  background: rgba(196,113,74,0.08);
}
.nav-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-bar {
  display: flex;
  align-items: center;
  background: #F9F7F4;
  border: 1.5px solid #D4CCBC;
  border-radius: 100px;
  padding: 8px 16px;
  gap: 8px;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
.search-bar:focus-within {
  border-color: #C4714A;
  background: #FFFFFF;
}
.search-bar input {
  background: none;
  border: none;
  font-size: 0.875rem;
  color: #3D2B1F;
  width: 180px;
}
.search-bar input::placeholder { color: #9C917E; }
.cart-btn {
  position: relative;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #C4714A;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 3px 12px rgba(196,113,74,0.3);
}
.cart-btn:hover { background: #A05A38; transform: scale(1.05); }
.cart-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: #C8961A;
  color: #3D2B1F;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 0.65rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid #FAF6EE;
}
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  padding: 8px;
  cursor: pointer;
}
.hamburger span {
  width: 22px;
  height: 2px;
  background: #3D2B1F;
  border-radius: 2px;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  display: block;
}

/* ── Mobile Menu ── */
/* ── Mobile Drawer Overlay ── */
.mobile-menu-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(61,43,31,0.5);
  z-index: 998;
  backdrop-filter: blur(3px);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.mobile-menu-overlay.open {
  display: block;
  opacity: 1;
}

/* ── Mobile Drawer (slides from RIGHT) ── */
.mobile-menu {
  position: fixed;
  top: 0;
  right: -320px;
  width: 300px;
  max-width: 85vw;
  height: 100vh;
  background: #FAF6EE;
  z-index: 999;
  padding: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: -8px 0 40px rgba(61,43,31,0.15);
}
.mobile-menu.open {
  right: 0;
}

/* Drawer Header */
.mobile-menu-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid #EDE9E0;
  background: #3D2B1F;
}
.mobile-menu-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #FAF6EE;
  font-weight: 700;
  font-size: 0.95rem;
}
.mobile-menu-close {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: #FAF6EE;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.mobile-menu-close:hover { background: rgba(255,255,255,0.2); }

/* Drawer Nav Links */
.mobile-menu-nav {
  display: flex;
  flex-direction: column;
  padding: 16px 12px;
  gap: 4px;
  flex: 1;
}
.mobile-menu .nav-link {
  font-size: 1rem;
  padding: 13px 16px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  color: #3D2B1F;
  font-weight: 500;
  transition: all 0.2s;
}
.mobile-menu .nav-link:hover,
.mobile-menu .nav-link.active {
  background: rgba(196,113,74,0.1);
  color: #C4714A;
  padding-left: 20px;
}

/* Drawer Search */
.mobile-menu-search {
  padding: 0 12px 12px;
}
.mobile-menu-search .search-bar {
  border-radius: 10px !important;
  width: 100%;
  background: white;
  border: 1.5px solid #D4CCBC;
  padding: 10px 16px;
}
.mobile-menu-search .search-bar input { width: 100%; }

/* Drawer Footer */
.mobile-menu-footer {
  padding: 16px 20px 24px;
  border-top: 1px solid #EDE9E0;
}

/* Hamburger → X animation */
.hamburger.is-open span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.hamburger.is-open span:nth-child(2) {
  opacity: 0;
  transform: scaleX(0);
}
.hamburger.is-open span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

/* ── Hero Section ── */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  background: linear-gradient(135deg, #FAF6EE 0%, #F0E8D8 50%, #E8D8C4 100%);
  position: relative;
  overflow: hidden;
  padding: 100px 0 60px;
}
.hero::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(196,113,74,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -50px;
  left: -50px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(107,127,94,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.hero-content { position: relative; z-index: 1; }
.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(196,113,74,0.1);
  border: 1px solid rgba(196,113,74,0.25);
  padding: 8px 18px;
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #C4714A;
  margin-bottom: 24px;
}
.hero-title {
  font-size: clamp(2.2rem, 5.5vw, 4rem);
  line-height: 1.1;
  color: #3D2B1F;
  margin-bottom: 20px;
}
.hero-title em {
  font-style: italic;
  color: #C4714A;
}
.hero-desc {
  font-size: 1.05rem;
  color: #6B4D3A;
  max-width: 480px;
  margin-bottom: 36px;
}
.hero-ctas { display: flex; gap: 16px; flex-wrap: wrap; }
.hero-stats {
  display: flex;
  gap: 40px;
  margin-top: 52px;
  padding-top: 32px;
  border-top: 1px solid #D4CCBC;
}
.hero-stat-num {
  font-family: "Georgia, serif";
  font-size: 1.75rem;
  font-weight: 700;
  color: #3D2B1F;
  line-height: 1;
}
.hero-stat-label { font-size: 0.8rem; color: #6B6055; margin-top: 4px; }
.hero-image-side {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-image-blob {
  width: 480px;
  height: 480px;
  background: linear-gradient(135deg, #E8C4A8, #F0E8D8);
  border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
  position: relative;
  overflow: hidden;
  box-shadow: 0 16px 60px rgba(61,43,31,0.20);
  animation: blobMorph 8s ease-in-out infinite;
}
@keyframes blobMorph {
  0%,100% { border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%; }
  33%      { border-radius: 45% 55% 40% 60% / 60% 40% 55% 45%; }
  66%      { border-radius: 55% 45% 60% 40% / 40% 55% 45% 60%; }
}
.hero-grain-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 24px;
  width: 100%;
  height: 100%;
}
.hero-grain-item {
  background: rgba(255,255,255,0.6);
  border-radius: 12px;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  font-weight: 600;
  color: #3D2B1F;
  gap: 4px;
  backdrop-filter: blur(4px);
}
.hero-grain-item .grain-emoji { font-size: 1.4rem; }
.hero-float-tag {
  position: absolute;
  background: white;
  border-radius: 12px;
  padding: 10px 16px;
  box-shadow: 0 8px 40px rgba(61,43,31,0.16);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  animation: float 3s ease-in-out infinite;
}
.hero-float-tag.tag-1 { top: 20px; left: -30px; animation-delay: 0s; }
.hero-float-tag.tag-2 { bottom: 40px; right: -20px; animation-delay: 1.5s; }
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

/* ── Trust Bar ── */
.trust-bar {
  background: #3D2B1F;
  padding: 20px 0;
  overflow: hidden;
}
.trust-ticker {
  display: flex;
  gap: 48px;
  animation: ticker 20s linear infinite;
  white-space: nowrap;
}
@keyframes ticker {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.trust-item {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #FAF6EE;
  font-size: 0.85rem;
  font-weight: 500;
}
.trust-item .icon { font-size: 1rem; }
.trust-dot {
  width: 4px;
  height: 4px;
  background: #E8C4A8;
  border-radius: 50%;
}

/* ── Product Grid ── */
.products-section { background: #F9F7F4; }
.filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 36px;
}
.filter-chip {
  padding: 8px 20px;
  border-radius: 100px;
  background: #FFFFFF;
  border: 1.5px solid #D4CCBC;
  font-size: 0.85rem;
  font-weight: 500;
  color: #6B6055;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
.filter-chip:hover { border-color: #C4714A; color: #C4714A; }
.filter-chip.active { background: #C4714A; border-color: #C4714A; color: white; }

/* ── Product Card ── */
.product-card {
  background: #FFFFFF;
  border-radius: 20px;
  border: 1.5px solid #EDE9E0;
  overflow: hidden;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.product-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 8px 40px rgba(61,43,31,0.16);
  border-color: #E8C4A8;
}
.product-img-wrap {
  position: relative;
  aspect-ratio: 4/3;
  background: linear-gradient(135deg, #F0E8D8, #E8C4A8);
  overflow: hidden;
}
.product-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}
.product-card:hover .product-img-wrap img { transform: scale(1.06); }
.product-badges {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.product-wish {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  border: 1px solid #EDE9E0;
}
.product-wish:hover { background: white; transform: scale(1.1); }
.product-info { padding: 18px; }
.product-category {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #6B7F5E;
  margin-bottom: 6px;
}
.product-name {
  font-family: "Georgia, serif";
  font-size: 1.05rem;
  font-weight: 600;
  color: #3D2B1F;
  margin-bottom: 6px;
  line-height: 1.3;
}
.product-desc {
  font-size: 0.8rem;
  color: #6B6055;
  line-height: 1.6;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-stock {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  margin-bottom: 12px;
}
.stock-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}
.stock-dot.in    { background: #28a745; }
.stock-dot.low   { background: #ffc107; }
.stock-dot.out   { background: #dc3545; }
.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.product-price-area {}
.product-price {
  font-family: "Georgia, serif";
  font-size: 1.3rem;
  font-weight: 700;
  color: #3D2B1F;
  line-height: 1;
}
.product-unit { font-size: 0.75rem; color: #9C917E; }
.add-cart-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #C4714A;
  color: white;
  padding: 9px 16px;
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 600;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  border: none;
  cursor: pointer;
}
.add-cart-btn:hover { background: #A05A38; transform: scale(1.04); }
.add-cart-btn:disabled { background: #D4CCBC; color: #9C917E; cursor: not-allowed; transform: none; }

/* ── Benefits Section ── */
.benefits-section { background: #3D2B1F; }
.benefits-section h2 { color: #FAF6EE; }
.benefits-section .section-label { color: #E8C4A8; }
.benefits-section .section-label::before,
.benefits-section .section-label::after { background: rgba(196,113,74,0.4); }
.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 28px 24px;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
.benefit-card:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(196,113,74,0.4);
  transform: translateY(-4px);
}
.benefit-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, #C4714A, #A05A38);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  margin-bottom: 16px;
}
.benefit-card h4 { color: #FAF6EE; margin-bottom: 8px; }
.benefit-card p  { color: rgba(250,246,238,0.65); font-size: 0.875rem; }

/* ── Why Us Section ── */
.why-us { background: #FFFFFF; }
.why-item {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}
.why-icon {
  width: 52px;
  height: 52px;
  min-width: 52px;
  background: linear-gradient(135deg, rgba(196,113,74,0.12), rgba(196,113,74,0.06));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  border: 1px solid #E8C4A8;
}
.why-item h4 { color: #3D2B1F; margin-bottom: 4px; }
.why-item p  { font-size: 0.875rem; }

/* ── Testimonials ── */
.testimonials { background: #F0E8D8; }
.testimonial-card {
  background: #FFFFFF;
  border-radius: 20px;
  padding: 28px;
  border: 1px solid #EDE9E0;
  position: relative;
}
.testimonial-card::before {
  content: '"';
  font-family: "Georgia, serif";
  font-size: 5rem;
  color: #E8C4A8;
  position: absolute;
  top: -10px;
  left: 20px;
  line-height: 1;
}
.testimonial-text { font-style: italic; color: #6B4D3A; padding-top: 24px; }
.testimonial-author { display: flex; align-items: center; gap: 12px; margin-top: 20px; }
.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #E8C4A8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
}
.author-name { font-weight: 600; font-size: 0.9rem; color: #3D2B1F; }
.author-loc  { font-size: 0.78rem; color: #9C917E; }
.stars { color: #C8961A; font-size: 0.85rem; margin-bottom: 6px; }

/* ── Newsletter ── */
.newsletter {
  background: linear-gradient(135deg, #C4714A 0%, #A05A38 100%);
  padding: 60px 0;
}
.newsletter h2 { color: white; }
.newsletter p  { color: rgba(255,255,255,0.8); }
.newsletter-form { display: flex; gap: 12px; max-width: 480px; margin: 24px auto 0; }
.newsletter-form input {
  flex: 1;
  padding: 14px 20px;
  border-radius: 100px;
  border: none;
  font-size: 0.95rem;
  background: rgba(255,255,255,0.15);
  color: white;
  backdrop-filter: blur(8px);
}
.newsletter-form input::placeholder { color: rgba(255,255,255,0.6); }
.newsletter-form input:focus { background: rgba(255,255,255,0.22); outline: none; }

/* ── Footer ── */
footer {
  background: #3D2B1F;
  color: #FAF6EE;
  padding: 60px 0 30px;
}
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; gap: 40px; }
.footer-brand {}
.footer-brand .nav-logo { color: #FAF6EE; margin-bottom: 16px; }
.footer-brand p { font-size: 0.875rem; color: rgba(250,246,238,0.6); line-height: 1.8; }
.footer-heading {
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #E8C4A8;
  margin-bottom: 16px;
}
.footer-links { display: flex; flex-direction: column; gap: 10px; }
.footer-link {
  font-size: 0.875rem;
  color: rgba(250,246,238,0.65);
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
.footer-link:hover { color: #E8C4A8; padding-left: 4px; }
.footer-contact-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 0.875rem;
  color: rgba(250,246,238,0.65);
  margin-bottom: 12px;
}
.footer-contact-item .icon { font-size: 0.9rem; margin-top: 2px; color: #E8C4A8; }
.social-links { display: flex; gap: 10px; margin-top: 20px; }
.social-link {
  width: 38px;
  height: 38px;
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  color: #FAF6EE;
}
.social-link:hover { background: #C4714A; transform: translateY(-2px); }
.footer-bottom {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.footer-bottom p { font-size: 0.8rem; color: rgba(250,246,238,0.4); }

/* ── Cart Sidebar ── */
.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(61,43,31,0.5);
  z-index: 1100;
  backdrop-filter: blur(3px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.cart-overlay.open { opacity: 1; pointer-events: all; }
.cart-sidebar {
  position: fixed;
  top: 0;
  right: -420px;
  bottom: 0;
  width: 400px;
  max-width: 100vw;
  background: #FFFFFF;
  z-index: 1101;
  display: flex;
  flex-direction: column;
  transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: -8px 0 40px rgba(61,43,31,0.15);
}
.cart-sidebar.open { right: 0; }
.cart-header {
  padding: 20px 24px;
  border-bottom: 1px solid #EDE9E0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.cart-header h3 { font-size: 1.1rem; }
.cart-close-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #EDE9E0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  border: none;
}
.cart-close-btn:hover { background: #D4CCBC; }
.cart-items { flex: 1; overflow-y: auto; padding: 20px 24px; }
.cart-empty {
  text-align: center;
  padding: 60px 20px;
  color: #9C917E;
}
.cart-empty .empty-icon { font-size: 3rem; margin-bottom: 16px; }
.cart-item {
  display: flex;
  gap: 14px;
  padding: 16px 0;
  border-bottom: 1px solid #EDE9E0;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }
.cart-item-img {
  width: 70px;
  height: 70px;
  border-radius: 12px;
  background: #F0E8D8;
  overflow: hidden;
  flex-shrink: 0;
}
.cart-item-img img { width:100%; height:100%; object-fit:cover; }
.cart-item-info { flex: 1; }
.cart-item-name { font-weight: 600; font-size: 0.9rem; color: #3D2B1F; margin-bottom: 4px; }
.cart-item-variant { font-size: 0.78rem; color: #9C917E; }
.cart-item-price { font-weight: 700; color: #C4714A; margin-top: 6px; }
.qty-control {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}
.qty-btn {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: #EDE9E0;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  font-weight: 600;
}
.qty-btn:hover { background: #C4714A; color: white; }
.qty-num { font-size: 0.9rem; font-weight: 600; min-width: 20px; text-align: center; }
.cart-item-remove {
  font-size: 0.75rem;
  color: #9C917E;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  border: none;
  background: none;
  padding: 0;
  margin-top: 4px;
  display: block;
}
.cart-item-remove:hover { color: #e05555; }
.cart-footer {
  padding: 20px 24px;
  border-top: 1px solid #EDE9E0;
  background: #F9F7F4;
}
.cart-subtotal {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 0.9rem;
}
.cart-total {
  display: flex;
  justify-content: space-between;
  font-size: 1.1rem;
  font-weight: 700;
  color: #3D2B1F;
  margin-bottom: 16px;
  padding-top: 12px;
  border-top: 1.5px solid #D4CCBC;
}
.checkout-btn {
  width: 100%;
  background: #C4714A;
  color: white;
  padding: 15px;
  border-radius: 100px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  border: none;
}
.checkout-btn:hover { background: #A05A38; transform: translateY(-1px); }

/* ── Page Header ── */
.page-header {
  background: linear-gradient(135deg, #F0E8D8, #E8C4A8);
  padding: 100px 0 50px;
}
.page-header h1 { color: #3D2B1F; margin-bottom: 8px; }
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: #6B6055;
}
.breadcrumb a { color: #C4714A; }
.breadcrumb span { color: #9C917E; }

/* ── Product Detail ── */
.product-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
.product-img-main {
  border-radius: 32px;
  overflow: hidden;
  aspect-ratio: 1;
  background: #F0E8D8;
}
.product-img-main img { width:100%; height:100%; object-fit:cover; }
.product-detail-name { font-size: 2rem; }
.product-detail-price { font-family: "Georgia, serif"; font-size: 2rem; color: #C4714A; }
.weight-options { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0; }
.weight-btn {
  padding: 8px 20px;
  border-radius: 100px;
  border: 2px solid #D4CCBC;
  background: white;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  color: #3D2B1F;
}
.weight-btn.active, .weight-btn:hover { border-color: #C4714A; color: #C4714A; background: rgba(196,113,74,0.05); }
.health-benefits {
  background: #FAF6EE;
  border-radius: 20px;
  padding: 20px;
  margin: 20px 0;
}
.health-benefits h4 { margin-bottom: 12px; }
.benefit-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(107,127,94,0.12);
  color: #6B7F5E;
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 500;
  margin: 3px;
}
.detail-add-cart {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}
.qty-selector {
  display: flex;
  align-items: center;
  gap: 0;
  border: 2px solid #D4CCBC;
  border-radius: 100px;
  overflow: hidden;
}
.qty-selector button {
  width: 44px;
  height: 44px;
  background: #EDE9E0;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  font-weight: 600;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
.qty-selector button:hover { background: #E8C4A8; }
.qty-selector span { padding: 0 16px; font-weight: 600; }

/* ── Checkout / Cart Page ── */
.checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 40px; align-items: start; }
.checkout-form-card {
  background: white;
  border-radius: 20px;
  padding: 32px;
  border: 1px solid #EDE9E0;
  box-shadow: 0 2px 8px rgba(61,43,31,0.08);
}
.checkout-form-card h3 { margin-bottom: 24px; }
.order-summary {
  background: white;
  border-radius: 20px;
  padding: 28px;
  border: 1px solid #EDE9E0;
  box-shadow: 0 2px 8px rgba(61,43,31,0.08);
  position: sticky;
  top: 88px;
}
.summary-item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #EDE9E0;
  font-size: 0.9rem;
}
.summary-total {
  display: flex;
  justify-content: space-between;
  padding: 16px 0 0;
  font-weight: 700;
  font-size: 1.1rem;
  color: #3D2B1F;
}
.payment-option {
  border: 2px solid #D4CCBC;
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.payment-option:hover, .payment-option.selected { border-color: #C4714A; background: rgba(196,113,74,0.04); }
.payment-option input[type=radio] { accent-color: #C4714A; }

/* ── Admin Dashboard ── */
.admin-layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.admin-sidebar {
  background: #3D2B1F;
  padding: 24px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.admin-sidebar-header { padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.admin-nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  color: rgba(250,246,238,0.65);
  font-size: 0.9rem;
  cursor: pointer;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  border-left: 3px solid transparent;
}
.admin-nav-item:hover, .admin-nav-item.active {
  color: #FAF6EE;
  background: rgba(255,255,255,0.07);
  border-left-color: #C4714A;
}
.admin-nav-item .icon { font-size: 1rem; }
.admin-content {
  background: #F9F7F4;
  padding: 32px;
  overflow-y: auto;
}
.admin-topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}
.stat-card {
  background: white;
  border-radius: 20px;
  padding: 24px;
  border: 1px solid #EDE9E0;
  box-shadow: 0 2px 8px rgba(61,43,31,0.08);
}
.stat-num {
  font-family: "Georgia, serif";
  font-size: 2rem;
  font-weight: 700;
  color: #3D2B1F;
  line-height: 1;
}
.stat-label { font-size: 0.85rem; color: #9C917E; margin-top: 4px; }
.stat-trend { font-size: 0.78rem; margin-top: 8px; }
.trend-up   { color: #28a745; }
.trend-down { color: #dc3545; }
.data-table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(61,43,31,0.08);
}
.data-table th {
  background: #F9F7F4;
  padding: 14px 16px;
  text-align: left;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: #6B6055;
  border-bottom: 2px solid #EDE9E0;
}
.data-table td {
  padding: 14px 16px;
  border-bottom: 1px solid #EDE9E0;
  font-size: 0.875rem;
  color: #3D2B1F;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #F9F7F4; }
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: white;
  border-radius: 32px;
  padding: 32px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(20px);
  transition: transform 0.3s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

/* ── Toast notifications ── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.toast {
  background: #3D2B1F;
  color: #FAF6EE;
  padding: 14px 20px;
  border-radius: 12px;
  font-size: 0.875rem;
  font-weight: 500;
  box-shadow: 0 8px 40px rgba(61,43,31,0.16);
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastIn 0.3s ease;
  border-left: 4px solid #C4714A;
}
.toast.success { border-left-color: #28a745; }
.toast.error   { border-left-color: #dc3545; }
@keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }

/* ── About Page ── */
.about-hero { background: linear-gradient(135deg, #3D2B1F 60%, #A05A38 100%); padding: 120px 0 70px; }
.about-hero h1 { color: #FAF6EE; }
.about-hero p  { color: rgba(250,246,238,0.75); }
.about-values-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
.value-card {
  background: #FFFFFF;
  border-radius: 20px;
  padding: 28px;
  border: 1px solid #EDE9E0;
  text-align: center;
  transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
.value-card:hover { transform:translateY(-4px); box-shadow:0 4px 20px rgba(61,43,31,0.12); border-color:#E8C4A8; }
.value-icon { font-size:2.5rem; margin-bottom:12px; }

// LIVE PRODUCTS — reads admin changes from localStorage
// Always call getProducts() instead of PRODUCTS directly
// so admin stock/price updates instantly show on all pages
// ═══════════════════════════════════════════════════
function getProducts() {
  const saved = localStorage.getItem('adminProducts');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    } catch(e) {}
  }
  return PRODUCTS;
}

// Sync: if admin saved products, keep PRODUCTS in memory updated too

  const saved = localStorage.getItem('adminProducts');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) {
        // Patch the Cart to use live stock
        window._liveProducts = parsed;
      }
    } catch(e) {}
  }
})();

const Cart = {
  // Load cart from localStorage
  items: JSON.parse(localStorage.getItem('nativeGrains_cart') || '[]'),

  // Save cart to localStorage
  save() {
    localStorage.setItem('nativeGrains_cart', JSON.stringify(this.items));
    this.updateUI();
  },

  // Add item to cart
  add(productId, weight, quantity = 1) {
    const product = getProducts().find(p => p.id === productId);
    if (!product) return;

    const key = `${productId}-${weight}`;
    const existing = this.items.find(i => i.key === key);

    if (existing) {
      existing.quantity += quantity;
    } else {
      this.items.push({
        key,
        productId,
        name: product.name,
        image: product.image,
        weight,
        price: product.prices[weight],
        quantity
      });
    }

    this.save();
    showToast(`${product.name} (${weight}) added to cart! 🛒`, 'success');
  },

  // Remove item from cart
  remove(key) {
    this.items = this.items.filter(i => i.key !== key);
    this.save();
  },

  // Update quantity
  setQty(key, qty) {
    const item = this.items.find(i => i.key === key);
    if (!item) return;
    if (qty <= 0) {
      this.remove(key);
    } else {
      item.quantity = qty;
      this.save();
    }
  },

  // Calculate subtotal
  subtotal() {
    return this.items.reduce((sum, i) => sum + (i.price * i.quantity), 0);
  },

  // Shipping cost
  shipping() {
    const sub = this.subtotal();
    if (sub === 0) return 0;
    return sub >= 500 ? 0 : 60;
  },

  // Total including shipping
  total() {
    return this.subtotal() + this.shipping();
  },

  // Total item count
  count() {
    return this.items.reduce((sum, i) => sum + i.quantity, 0);
  },

  // Update cart badge and re-render sidebar if open
  updateUI() {
    const badge = document.querySelector('.cart-badge');
    const count = this.count();
    if (badge) {
      badge.textContent = count;
      badge.style.display = count > 0 ? 'flex' : 'none';
    }
    renderCartSidebar();
  }
};

function renderCartSidebar() {

  const subtotalEl = document.getElementById('cartSubtotal');
  const shippingEl = document.getElementById('cartShipping');
  const totalEl    = document.getElementById('cartTotal');

  if (Cart.items.length === 0) {
    container.innerHTML = `

        <h4>Your cart is empty</h4>
        <p class="mt-2 text-sm text-gray">Add some healthy grains to get started!</p>

  } else {
    container.innerHTML = Cart.items.map(item => `
      <div class="cart-item" id="ci-${item.key.replace(/[^a-z0-9]/gi,'-')}">
        <div class="cart-item-img">
          <img src="${item.image}" alt="${item.name}" loading="lazy">

        <div class="cart-item-info">

          <div class="cart-item-variant">${item.weight}</div>

  if (subtotalEl) subtotalEl.textContent = fmt(Cart.subtotal());
  if (shippingEl) shippingEl.textContent = Cart.shipping() === 0 ? 'FREE' : fmt(Cart.shipping());

}

// ═══════════════════════════════════════════════════
// TOAST NOTIFICATIONS
// ═══════════════════════════════════════════════════

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer') || createToastContainer();
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span>${message}`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(20px)'; toast.style.transition = '0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
}

function createToastContainer() {
  const div = document.createElement('div');
  div.id = 'toastContainer';
  div.className = 'toast-container';
  document.body.appendChild(div);
  return div;
}

// ═══════════════════════════════════════════════════
// MOBILE MENU OPEN / CLOSE
// ═══════════════════════════════════════════════════

function openMobileMenu() {
  const menu    = document.getElementById('mobileMenu');
  const overlay = document.getElementById('mobileOverlay');
  const burger  = document.getElementById('hamburger');
  if (!menu) return;
  menu.classList.add('open');
  if (overlay) overlay.classList.add('open');
  if (burger)  burger.classList.add('is-open');
  document.body.style.overflow = 'hidden';
}

function closeMobileMenu() {
  const menu    = document.getElementById('mobileMenu');
  const overlay = document.getElementById('mobileOverlay');
  const burger  = document.getElementById('hamburger');
  if (menu)    menu.classList.remove('open');
  if (overlay) overlay.classList.remove('open');
  if (burger)  burger.classList.remove('is-open');
  document.body.style.overflow = '';
}

function initNavbar() {
  const navbar    = document.getElementById('navbar');
  const hamburger = document.getElementById('hamburger');

  if (navbar) {
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 20);
    }, { passive: true });
  }

  // Use onclick directly on hamburger — always works regardless of menu injection timing
  if (hamburger) {
    hamburger.onclick = function() {
      const menu = document.getElementById('mobileMenu');
      if (!menu) return;
      const isOpen = menu.classList.contains('open');
      if (isOpen) { closeMobileMenu(); } else { openMobileMenu(); }
    };
  }

  // Delegated listener — catches nav-link clicks even if menu injected later
  document.addEventListener('click', function(e) {
    if (e.target.closest('.mobile-menu .nav-link')) {
      closeMobileMenu();
    }
  });

  // Update active nav link
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-link').forEach(link => {
    const href = link.getAttribute('href') || '';
    if (href.includes(currentPage) || (currentPage === 'index.html' && href === '#') ||
        (currentPage === '' && href === '#')) {
      link.classList.add('active');
    }
  });
}

// ═══════════════════════════════════════════════════
// SEARCH FUNCTIONALITY
// ═══════════════════════════════════════════════════

function initSearch() {
  const input = document.getElementById('searchInput');
  if (!input) return;

  input.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    const cards = document.querySelectorAll('.product-card');
    cards.forEach(card => {
      const name = card.querySelector('.product-name')?.textContent.toLowerCase() || '';
      const desc = card.querySelector('.product-desc')?.textContent.toLowerCase() || '';
      const cat  = card.querySelector('.product-category')?.textContent.toLowerCase() || '';
      card.style.display = (!query || name.includes(query) || desc.includes(query) || cat.includes(query)) ? '' : 'none';
    });
  });
}

// ═══════════════════════════════════════════════════
// FILTER CHIPS
// ═══════════════════════════════════════════════════

function initFilters() {
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      const filter = chip.dataset.filter;
      document.querySelectorAll('.product-card').forEach(card => {
        card.style.display = (!filter || filter === 'all' || card.dataset.category === filter) ? '' : 'none';
      });
    });
  });
}

              <div style="background:white;border-radius:6px;padding:10px 14px;border:1px solid #EDE9E0">
                <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:#9C917E">${k}</div>
                <div style="font-weight:700;color:#3D2B1F;margin-top:2px">${v}</div>
              </div>`).join('')}
          </div>
        </div>

        <!-- Trust badges -->
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:20px;padding-top:20px;border-top:1px solid #EDE9E0">
          <div style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:#6B6055">
            <span>🚚</span> Free ship ₹500+
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:#6B6055">
            <span>↩️</span> Easy returns
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:#6B6055">
            <span>🔒</span> Secure payment
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:#6B6055">
            <span>🌿</span> 100% natural
          </div>
        </div>
      </div>`;
  }

  window.selectWeight = (weight, btn) => {
    selectedWeight = weight;
    document.querySelectorAll('.weight-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('detailPrice').textContent = `₹${getPrice().toLocaleString('en-IN')}`;
  };

  window.changeQty = (delta) => {
    qty = Math.max(1, qty + delta);
    document.getElementById('qtyDisplay').textContent = qty;
  };

  window.addToCartDetail = () => {
    Cart.add(product.id, selectedWeight, qty);
    openCart();
  };

  render();

  // ── Related Products ──
  const related = getProducts().filter(p => p.id !== product.id && p.category === product.category).slice(0,4);
  const fallback = getProducts().filter(p => p.id !== product.id).slice(0,4);
  const toShow   = related.length >= 2 ? related : fallback;
  document.getElementById('relatedGrid').innerHTML = toShow.map(p => renderProductCard(p)).join('');
});
</script>
</body>
</html>
